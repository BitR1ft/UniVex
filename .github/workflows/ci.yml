# =============================================================================
# CI Pipeline — Backend, Frontend & Integration Tests
# v2.0: Security tests, performance regression gate, container scan
#
# Triggers on every push and pull request to main/develop branches.
# =============================================================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  pull-requests: write
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

# =============================================================================
# JOB 1: Backend Lint
# =============================================================================
jobs:
  backend-lint:
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install ruff mypy

      - name: Run ruff linter
        run: |
          cd backend
          ruff check app/ --output-format=github

      - name: Run mypy type checker
        run: |
          cd backend
          mypy app/ --ignore-missing-imports --no-strict-optional

# =============================================================================
# JOB 2: Backend Tests
# =============================================================================
  backend-tests:
    name: Backend — Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: univex
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: univex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U univex -d univex_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://univex:testpassword@localhost:5432/univex_test
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-testing
      ENVIRONMENT: testing
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run unit tests with coverage
        run: |
          cd backend
          pytest tests/ \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-fail-under=70 \
            -v \
            --tb=short \
            -x \
            2>&1 | tee test-results.txt

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: backend/coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results
          path: backend/test-results.txt
          retention-days: 7

# =============================================================================
# JOB 3: v2.0 Security Tests
# =============================================================================
  backend-security-tests:
    name: Backend — v2.0 Security Tests
    runs-on: ubuntu-latest
    needs: backend-lint

    env:
      ENVIRONMENT: testing
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-testing
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run security tests (TOTP, lockout, IP allowlist, WAF, RBAC)
        run: |
          cd backend
          pytest tests/security/test_v2_security.py \
            -v --tb=short \
            --junitxml=security-test-results.xml \
            2>&1 | tee security-test-results.txt
          echo "Security tests passed: $(grep -c 'PASSED' security-test-results.txt) tests"

      - name: Upload security test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-test-results
          path: |
            backend/security-test-results.xml
            backend/security-test-results.txt
          retention-days: 30

# =============================================================================
# JOB 4: Chaos Tests
# =============================================================================
  backend-chaos:
    name: Backend — Chaos Tests
    runs-on: ubuntu-latest
    needs: backend-lint
    if: github.event_name != 'pull_request' || contains(github.event.pull_request.labels.*.name, 'chaos-tests')

    env:
      ENVIRONMENT: testing
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-testing
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run chaos tests
        run: |
          cd backend
          pytest tests/test_chaos.py -v --tb=short

# =============================================================================
# JOB 5: Frontend Lint
# =============================================================================
  frontend-lint:
    name: Frontend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run ESLint
        run: |
          cd frontend
          npm run lint -- --format=json --output-file=eslint-results.json || true
          npm run lint

      - name: Run TypeScript type check
        run: |
          cd frontend
          npm run type-check

      - name: Upload ESLint results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eslint-results
          path: frontend/eslint-results.json
          retention-days: 7

# =============================================================================
# JOB 6: Frontend Tests
# =============================================================================
  frontend-tests:
    name: Frontend — Unit Tests
    runs-on: ubuntu-latest
    needs: frontend-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Run Jest tests with coverage
        run: |
          cd frontend
          npm run test:coverage -- \
            --ci \
            --reporters=default \
            --reporters=jest-junit \
            --coverageReporters=text \
            --coverageReporters=lcov \
            --coverageThreshold='{"global":{"lines":70}}' \
          2>&1 | tee test-results.txt
        env:
          JEST_JUNIT_OUTPUT_DIR: ./test-results

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-results
          path: frontend/test-results
          retention-days: 7

# =============================================================================
# JOB 7: Performance Regression Gate
# =============================================================================
  performance-gate:
    name: Backend — Performance Regression Gate
    runs-on: ubuntu-latest
    needs: backend-tests
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    env:
      ENVIRONMENT: testing
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-testing
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          pip install locust

      - name: Run performance smoke test (p99 < 500ms gate)
        run: |
          cd backend
          python -c "
          import time, statistics
          # Simulate core processing function latency benchmarks
          # Real p99 API latency measured via integration tests
          samples = []
          for _ in range(100):
              start = time.perf_counter()
              # Import and exercise core modules
              from app.core.security import create_access_token
              from app.core.rate_limit import SlidingWindowRateLimiter
              limiter = SlidingWindowRateLimiter(max_calls=60, window_seconds=60)
              limiter.is_allowed('perf-test-user')
              token = create_access_token({'sub': 'test'})
              end = time.perf_counter()
              samples.append((end - start) * 1000)
          p99 = statistics.quantiles(samples, n=100)[98]
          p50 = statistics.median(samples)
          print(f'Performance Gate — p50={p50:.2f}ms  p99={p99:.2f}ms')
          assert p99 < 500, f'PERFORMANCE REGRESSION: p99 latency {p99:.2f}ms exceeds 500ms threshold'
          print('✓ Performance gate PASSED')
          "

# =============================================================================
# JOB 8: Container Security Scan (new images)
# =============================================================================
  container-security-scan:
    name: Container — Trivy Security Scan
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build backend Docker image for scanning
        run: |
          docker build -t univex-backend:scan ./backend

      - name: Run Trivy scan on backend image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: univex-backend:scan
          format: sarif
          output: trivy-backend-results.sarif
          severity: CRITICAL,HIGH
          exit-code: 0    # Don't fail CI — report findings via SARIF

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-backend-results.sarif
          category: trivy-backend

# =============================================================================
# JOB 9: Integration Tests
# =============================================================================
  integration-tests:
    name: Integration Tests (Full Stack)
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: univex
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: univex_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U univex -d univex_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7474:7474
          - 7687:7687
        options: >-
          --health-cmd "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
          --health-start-period 30s

    env:
      DATABASE_URL: postgresql://univex:testpassword@localhost:5432/univex_test
      NEO4J_URI: bolt://localhost:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: testpassword
      SECRET_KEY: ci-test-secret-key-that-is-long-enough-for-testing
      ENVIRONMENT: testing
      PYTHONPATH: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install backend dependencies
        run: |
          cd backend
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run integration tests
        run: |
          cd backend
          pytest tests/test_week26_integration.py tests/test_week26_contracts.py -v --tb=short

      - name: Upload integration test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: backend/
          retention-days: 7

