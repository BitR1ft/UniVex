    steps:
      - name: Check all jobs status
        run: |
          echo "## CI Summary — UniVex v2.0"
          echo "Backend Tests      : ${{ needs.backend-tests.result }}"
          echo "Security Tests     : ${{ needs.backend-security-tests.result }}"
          echo "Frontend Tests     : ${{ needs.frontend-tests.result }}"
          echo "Chaos Tests        : ${{ needs.backend-chaos.result }}"
          echo "Performance Gate   : ${{ needs.performance-gate.result }}"

          if [[ "${{ needs.backend-tests.result }}" == "failure" || \
                "${{ needs.frontend-tests.result }}" == "failure" || \
                "${{ needs.backend-security-tests.result }}" == "failure" ]]; then
            echo "❌ CI FAILED"
            exit 1
          else
            echo "✅ CI PASSED (v2.0)"
          fi
    name: Backend — Lint & Type Check
    runs-on: ubuntu-latest

    steps:
