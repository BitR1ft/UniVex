# =============================================================================
# Day 191-192: Release Automation — Version Tagging, Changelog & Release Notes
# =============================================================================

name: Release

on:
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: true
        type: choice
        options:
          - patch   # 1.0.0 → 1.0.1
          - minor   # 1.0.0 → 1.1.0
          - major   # 1.0.0 → 2.0.0
      pre_release:
        description: 'Mark as pre-release'
        required: false
        default: 'false'
        type: boolean
      dry_run:
        description: 'Dry run (no actual release created)'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: write
  packages: write
  id-token: write

# =============================================================================
# JOB 1: Calculate New Version
# =============================================================================
jobs:
  calculate-version:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      new_tag: ${{ steps.bump.outputs.new_tag }}
      changelog: ${{ steps.changelog.outputs.changelog }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: $LATEST"

      - name: Calculate new version
        id: bump
        run: |
          LATEST="${{ steps.latest_tag.outputs.latest }}"
          BUMP="${{ github.event.inputs.version_bump }}"

          # Remove 'v' prefix
          VERSION="${LATEST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          case "$BUMP" in
            major) MAJOR=$((MAJOR+1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR+1)); PATCH=0 ;;
            patch) PATCH=$((PATCH+1)) ;;
          esac

          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          NEW_TAG="v$NEW_VERSION"

          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"
          echo "Bumping $LATEST → $NEW_TAG ($BUMP)"

      - name: Generate changelog
        id: changelog
        run: |
          LATEST="${{ steps.latest_tag.outputs.latest }}"
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"

          echo "Generating changelog from $LATEST to HEAD..."

          CHANGELOG=$(git log "$LATEST"..HEAD \
            --pretty=format:"- %s (%h)" \
            --no-merges \
            | head -50)

          if [[ -z "$CHANGELOG" ]]; then
            CHANGELOG="- No significant changes since last release"
          fi

          # Write to file (multiline output handling)
          cat > /tmp/changelog.md <<EOF
          ## What's Changed in $NEW_TAG

          ### Commits
          $CHANGELOG

          ### Full Changelog
          https://github.com/${{ github.repository }}/compare/$LATEST...$NEW_TAG
          EOF

          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          cat /tmp/changelog.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

# =============================================================================
# JOB 2: Create Git Tag
# =============================================================================
  create-tag:
    name: Create Version Tag
    runs-on: ubuntu-latest
    needs: calculate-version
    if: github.event.inputs.dry_run != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create and push tag
        run: |
          TAG="${{ needs.calculate-version.outputs.new_tag }}"
          VERSION="${{ needs.calculate-version.outputs.new_version }}"

          git tag -a "$TAG" -m "Release $VERSION

          ${{ needs.calculate-version.outputs.changelog }}"

          git push origin "$TAG"
          echo "✅ Tag $TAG created and pushed"

# =============================================================================
# JOB 3: Build Release Images
# =============================================================================
  build-release-images:
    name: Build Release Docker Images
    runs-on: ubuntu-latest
    needs: [calculate-version, create-tag]
    if: github.event.inputs.dry_run != 'true'

    env:
      REGISTRY: ghcr.io
      BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autopentestai-backend
      FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autopentestai-frontend

    steps:
      - name: Checkout code at new tag
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.calculate-version.outputs.new_tag }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend release image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ needs.calculate-version.outputs.new_version }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ needs.calculate-version.outputs.new_version }}

      - name: Build and push frontend release image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ needs.calculate-version.outputs.new_version }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          provenance: true
          sbom: true
          build-args: |
            VERSION=${{ needs.calculate-version.outputs.new_version }}
            NEXT_TELEMETRY_DISABLED=1

# =============================================================================
# JOB 4: Create GitHub Release
# =============================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [calculate-version, build-release-images]
    if: github.event.inputs.dry_run != 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.calculate-version.outputs.new_tag }}
          fetch-depth: 0

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.calculate-version.outputs.new_tag }}
          name: AutoPenTest AI ${{ needs.calculate-version.outputs.new_version }}
          body: ${{ needs.calculate-version.outputs.changelog }}
          prerelease: ${{ github.event.inputs.pre_release == 'true' }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

# =============================================================================
# JOB 5: Dry Run Summary
# =============================================================================
  dry-run-summary:
    name: Dry Run Summary
    runs-on: ubuntu-latest
    needs: calculate-version
    if: github.event.inputs.dry_run == 'true'

    steps:
      - name: Display what would have been released
        run: |
          echo "🔍 DRY RUN — No changes were made"
          echo ""
          echo "Would create tag: ${{ needs.calculate-version.outputs.new_tag }}"
          echo "Would create release: AutoPenTest AI ${{ needs.calculate-version.outputs.new_version }}"
          echo "Pre-release: ${{ github.event.inputs.pre_release }}"
          echo ""
          echo "Changelog preview:"
          echo "${{ needs.calculate-version.outputs.changelog }}"
