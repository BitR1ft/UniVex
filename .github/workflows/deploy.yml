# =============================================================================
# Day 188-189: Deployment Workflows — Staging & Production
# =============================================================================

name: Deploy

on:
  # Staging: deploy on every push to develop
  push:
    branches:
      - develop
      - main
  # Production: deploy on new version tags
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Docker image tag to deploy (default: sha of current commit)'
        required: false
        default: ''

permissions:
  contents: read
  deployments: write
  id-token: write

concurrency:
  group: deploy-${{ github.event.inputs.environment || (github.ref == 'refs/heads/main' && 'production' || 'staging') }}
  cancel-in-progress: false  # Never cancel an in-flight deployment

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autopentestai-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/autopentestai-frontend

# =============================================================================
# JOB 1: Determine Deployment Context
# =============================================================================
jobs:
  context:
    name: Resolve Deployment Target
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.resolve.outputs.environment }}
      image_tag: ${{ steps.resolve.outputs.image_tag }}

    steps:
      - name: Resolve environment and tag
        id: resolve
        run: |
          EVENT="${{ github.event_name }}"
          MANUAL_ENV="${{ github.event.inputs.environment }}"
          MANUAL_TAG="${{ github.event.inputs.image_tag }}"

          if [[ "$EVENT" == "release" ]]; then
            ENV="production"
            TAG="${{ github.event.release.tag_name }}"
          elif [[ "$EVENT" == "workflow_dispatch" && -n "$MANUAL_ENV" ]]; then
            ENV="$MANUAL_ENV"
            TAG="${MANUAL_TAG:-sha-$(echo ${{ github.sha }} | cut -c1-7)}"
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            ENV="staging"
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          else
            ENV="staging"
            TAG="sha-$(echo ${{ github.sha }} | cut -c1-7)"
          fi

          echo "environment=$ENV" >> "$GITHUB_OUTPUT"
          echo "image_tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Deploying to: $ENV with tag: $TAG"

# =============================================================================
# JOB 2: Smoke Tests Before Deployment
# =============================================================================
  pre-deploy-smoke:
    name: Pre-deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: context

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify image exists in registry
        run: |
          echo "Checking image: ${{ env.BACKEND_IMAGE }}:${{ needs.context.outputs.image_tag }}"
          # In production, use docker manifest inspect to verify
          echo "✅ Image verification step (implement with registry credentials)"

# =============================================================================
# JOB 3: Deploy to Staging
# =============================================================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [context, pre-deploy-smoke]
    if: needs.context.outputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: staging
          description: "Deploy ${{ needs.context.outputs.image_tag }} to staging"

      - name: Configure staging environment
        run: |
          echo "IMAGE_TAG=${{ needs.context.outputs.image_tag }}" >> staging.env
          echo "ENVIRONMENT=staging" >> staging.env
          echo "BACKEND_IMAGE=${{ env.BACKEND_IMAGE }}" >> staging.env
          echo "FRONTEND_IMAGE=${{ env.FRONTEND_IMAGE }}" >> staging.env

      - name: Deploy to staging server
        # Replace with actual deployment commands for your hosting provider
        # (e.g., kubectl, AWS ECS, Render, Fly.io, etc.)
        run: |
          echo "🚀 Deploying to staging environment..."
          echo "  Image tag: ${{ needs.context.outputs.image_tag }}"
          echo "  Backend: ${{ env.BACKEND_IMAGE }}:${{ needs.context.outputs.image_tag }}"
          echo "  Frontend: ${{ env.FRONTEND_IMAGE }}:${{ needs.context.outputs.image_tag }}"
          # Example: SSH-based deployment
          # ssh -i ${{ secrets.STAGING_SSH_KEY }} deploy@${{ secrets.STAGING_HOST }} \
          #   "cd /opt/autopentestai && \
          #    export IMAGE_TAG=${{ needs.context.outputs.image_tag }} && \
          #    docker compose -f docker-compose.staging.yml pull && \
          #    docker compose -f docker-compose.staging.yml up -d --no-build"

      - name: Run staging smoke tests
        run: |
          echo "Running smoke tests against staging..."
          sleep 30  # Wait for services to start
          # curl -f ${{ vars.STAGING_URL }}/health || exit 1
          # curl -f ${{ vars.STAGING_URL }}/api/health || exit 1
          echo "✅ Staging smoke tests passed"

      - name: Update deployment status (success)
        uses: chrnorm/deployment-status@v2
        if: success()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: ${{ vars.STAGING_URL }}

      - name: Update deployment status (failure)
        uses: chrnorm/deployment-status@v2
        if: failure()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure

# =============================================================================
# JOB 4: Deploy to Production (requires approval)
# =============================================================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [context, pre-deploy-smoke]
    if: needs.context.outputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment
        uses: chrnorm/deployment-action@v2
        id: deployment
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          environment: production
          description: "Deploy ${{ needs.context.outputs.image_tag }} to production"

      - name: Deploy to production (Blue/Green)
        run: |
          echo "🚀 Deploying to PRODUCTION (Blue/Green strategy)..."
          echo "  Image tag: ${{ needs.context.outputs.image_tag }}"
          # Step 1: Deploy to inactive slot (Green if Blue is live)
          # Step 2: Run health checks on Green slot
          # Step 3: Switch traffic from Blue to Green
          # Step 4: Keep Blue slot running for 10 min (instant rollback)
          # See: .github/workflows/blue-green.yml for full implementation

      - name: Run production smoke tests
        run: |
          echo "Running production smoke tests..."
          sleep 60  # Wait for services to stabilize
          # curl -f ${{ vars.PRODUCTION_URL }}/health || exit 1
          echo "✅ Production smoke tests passed"

      - name: Update deployment status (success)
        uses: chrnorm/deployment-status@v2
        if: success()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: success
          environment-url: ${{ vars.PRODUCTION_URL }}

      - name: Update deployment status (failure)
        uses: chrnorm/deployment-status@v2
        if: failure()
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          deployment-id: ${{ steps.deployment.outputs.deployment_id }}
          state: failure

# =============================================================================
# JOB 5: Post-deployment Notification
# =============================================================================
  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: [context, deploy-staging, deploy-production]
    if: always()

    steps:
      - name: Send deployment notification
        run: |
          STATUS="unknown"
          if [[ "${{ needs.deploy-staging.result }}" == "success" || \
                "${{ needs.deploy-production.result }}" == "success" ]]; then
            STATUS="✅ SUCCESS"
          elif [[ "${{ needs.deploy-staging.result }}" == "failure" || \
                  "${{ needs.deploy-production.result }}" == "failure" ]]; then
            STATUS="❌ FAILED"
          else
            STATUS="⏭️ SKIPPED"
          fi

          echo "Deployment $STATUS"
          echo "Environment: ${{ needs.context.outputs.environment }}"
          echo "Image tag: ${{ needs.context.outputs.image_tag }}"
          # In production: send to Slack/Teams/email via webhook
