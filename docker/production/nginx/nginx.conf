# =============================================================================
# UniVex — Production Nginx Reverse Proxy Configuration
# Day 29: Security Hardening & Production Readiness
#
# Features:
#   - TLS 1.2/1.3 only with strong ciphers
#   - HTTP/2 support
#   - Security headers (HSTS, CSP, X-Content-Type-Options, etc.)
#   - Request size limits (protect against large payload attacks)
#   - WebSocket proxy pass for real-time chat/agent streaming
#   - Rate limiting zones (per IP, per connection)
#   - Brotli/gzip compression
#   - Static asset caching
#   - Admin endpoint IP allow-listing
# =============================================================================

user  nginx;
worker_processes  auto;
worker_rlimit_nofile 65535;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections 4096;
    multi_accept       on;
    use                epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ===========================================================================
    # Logging — JSON structured format for SIEM ingestion
    # ===========================================================================
    log_format json_combined escape=json
        '{"timestamp":"$time_iso8601",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"remote_addr":"$remote_addr",'
        '"http_referer":"$http_referer",'
        '"http_user_agent":"$http_user_agent",'
        '"http_x_forwarded_for":"$http_x_forwarded_for",'
        '"request_id":"$request_id"}';

    access_log /var/log/nginx/access.log json_combined;

    # ===========================================================================
    # Performance
    # ===========================================================================
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  75s;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens      off;    # Hide Nginx version

    # ===========================================================================
    # Compression
    # ===========================================================================
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/geo+json
        application/javascript
        application/x-javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rdf+xml
        application/rss+xml
        application/vnd.ms-fontobject
        application/wasm
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/eot
        font/otf
        font/ttf
        image/svg+xml
        text/cache-manifest
        text/calendar
        text/css
        text/javascript
        text/markdown
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy
        text/xml;

    # ===========================================================================
    # Request Size Limits (protect against large payload attacks)
    # ===========================================================================
    client_max_body_size        50m;   # Max upload size (reports, attachments)
    client_body_buffer_size     128k;
    client_header_buffer_size   1k;
    large_client_header_buffers 4 8k;
    client_body_timeout         30s;
    client_header_timeout       30s;
    send_timeout                30s;

    # ===========================================================================
    # Rate Limiting Zones
    # ===========================================================================
    # General API rate limiting — 60 req/min per IP
    limit_req_zone  $binary_remote_addr  zone=api_limit:20m    rate=60r/m;
    # Login endpoint — 5 req/min per IP (brute-force protection)
    limit_req_zone  $binary_remote_addr  zone=login_limit:10m  rate=5r/m;
    # WebSocket connections — 10 per IP
    limit_conn_zone $binary_remote_addr  zone=ws_conn:10m;

    limit_req_status  429;
    limit_conn_status 429;

    # ===========================================================================
    # Upstream definitions
    # ===========================================================================
    upstream backend_pool {
        least_conn;
        server backend:8000  max_fails=3 fail_timeout=30s;
        keepalive 32;
    }

    upstream frontend_pool {
        least_conn;
        server frontend:3000  max_fails=3 fail_timeout=30s;
        keepalive 16;
    }

    # ===========================================================================
    # Admin IP allow-list — restrict /api/admin/* to known CIDRs
    # Override via environment-specific include or set $admin_allowed in a map.
    # ===========================================================================
    geo $admin_allowed {
        default          0;
        127.0.0.1        1;   # localhost (for health checks)
        10.0.0.0/8      1;   # private RFC-1918
        172.16.0.0/12   1;   # private RFC-1918
        192.168.0.0/16  1;   # private RFC-1918
        # Add your management CIDR below:
        # 203.0.113.0/24 1;
    }

    # ===========================================================================
    # HTTP → HTTPS redirect
    # ===========================================================================
    server {
        listen      80  default_server;
        listen      [::]:80 default_server;
        server_name _;

        # ACME challenge for Let's Encrypt renewal
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ===========================================================================
    # HTTPS — Main server block
    # ===========================================================================
    server {
        listen      443 ssl http2;
        listen      [::]:443 ssl http2;
        server_name ${DOMAIN_NAME};  # Replace with your domain at deploy time

        # ------------------------------------------------------------------
        # TLS configuration — TLS 1.2 / 1.3 only, strong ciphers
        # ------------------------------------------------------------------
        ssl_certificate      /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key  /etc/nginx/certs/privkey.pem;
        ssl_trusted_certificate /etc/nginx/certs/chain.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;   # TLS 1.3 negotiates its own
        ssl_session_cache   shared:SSL:50m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # OCSP stapling
        ssl_stapling        on;
        ssl_stapling_verify on;
        resolver 1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout 5s;

        # DH parameters (generate with: openssl dhparam -out /etc/nginx/certs/dhparam.pem 4096)
        ssl_dhparam /etc/nginx/certs/dhparam.pem;

        # ------------------------------------------------------------------
        # Security Headers
        # ------------------------------------------------------------------
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    "nosniff" always;
        add_header X-Frame-Options           "DENY" always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=(), payment=()" always;
        add_header Content-Security-Policy
            "default-src 'self'; "
            "script-src 'self' 'unsafe-inline' 'unsafe-eval'; "
            "style-src 'self' 'unsafe-inline'; "
            "img-src 'self' data: blob:; "
            "font-src 'self'; "
            "connect-src 'self' wss: ws:; "
            "frame-ancestors 'none'; "
            "base-uri 'self'; "
            "form-action 'self';"
            always;
        # Request-ID for distributed tracing
        add_header X-Request-ID $request_id always;

        # ------------------------------------------------------------------
        # Proxy settings (shared)
        # ------------------------------------------------------------------
        proxy_http_version   1.1;
        proxy_set_header     Host              $host;
        proxy_set_header     X-Real-IP         $remote_addr;
        proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header     X-Forwarded-Proto $scheme;
        proxy_set_header     X-Request-ID      $request_id;
        proxy_read_timeout   120s;
        proxy_connect_timeout 10s;
        proxy_send_timeout   60s;
        proxy_buffer_size    4k;
        proxy_buffers        8 16k;
        proxy_busy_buffers_size 32k;

        # ------------------------------------------------------------------
        # Health check endpoint (no rate limit, no auth)
        # ------------------------------------------------------------------
        location = /health {
            proxy_pass http://backend_pool/health;
            access_log off;
            proxy_read_timeout 5s;
        }

        # ------------------------------------------------------------------
        # Admin endpoints — IP allow-list enforced
        # ------------------------------------------------------------------
        location /api/admin/ {
            if ($admin_allowed = 0) {
                return 403 '{"error":"Forbidden: admin access restricted to allowed IPs"}';
            }
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend_pool;
        }

        # ------------------------------------------------------------------
        # Auth/Login endpoint — strict rate limiting
        # ------------------------------------------------------------------
        location ~ ^/api/(auth/login|auth/token|auth/2fa) {
            limit_req zone=login_limit burst=3 nodelay;
            proxy_pass http://backend_pool;
        }

        # ------------------------------------------------------------------
        # WebSocket proxy — agent streaming & real-time chat
        # ------------------------------------------------------------------
        location /ws {
            limit_conn ws_conn 10;
            proxy_pass http://backend_pool;
            proxy_http_version 1.1;
            proxy_set_header Upgrade    $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host       $host;
            proxy_set_header X-Real-IP  $remote_addr;
            proxy_read_timeout  86400s;   # 24 h for long-lived agent sessions
            proxy_send_timeout  86400s;
        }

        # ------------------------------------------------------------------
        # Backend API
        # ------------------------------------------------------------------
        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            proxy_pass http://backend_pool;
        }

        # ------------------------------------------------------------------
        # Frontend — Next.js static assets with aggressive caching
        # ------------------------------------------------------------------
        location /_next/static/ {
            proxy_pass http://frontend_pool;
            proxy_cache_valid 200 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
        }

        location /static/ {
            proxy_pass http://frontend_pool;
            proxy_cache_valid 200 7d;
            add_header Cache-Control "public, max-age=604800";
            access_log off;
        }

        # ------------------------------------------------------------------
        # All other requests → Next.js frontend
        # ------------------------------------------------------------------
        location / {
            proxy_pass http://frontend_pool;
        }

        # ------------------------------------------------------------------
        # Security: block hidden files and sensitive paths
        # ------------------------------------------------------------------
        location ~ /\. {
            deny all;
            access_log off;
        }

        location ~ \.(env|log|sh|sql|bak|cfg|conf|ini)$ {
            deny all;
            access_log off;
        }
    }
}
