# ==============================================================================
# AutoPenTest AI — Production Environment Configuration
# Day 189: Production Environment Setup
#
# ⚠️  IMPORTANT: Never commit .env.production — use secrets management.
#
# Usage:
#   export IMAGE_TAG=v1.2.3
#   docker compose -f docker/production/docker-compose.production.yml \
#     --env-file .env.production up -d
# ==============================================================================

version: '3.8'

x-logging: &production-logging
  driver: json-file
  options:
    max-size: "50m"
    max-file: "10"

x-restart: &always-restart
  restart: always

services:
  # ============================================================================
  # DATABASE TIER — High availability configuration
  # ============================================================================

  postgres:
    image: postgres:16-alpine
    container_name: autopentestai-prod-postgres
    <<: *always-restart
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB required}
      POSTGRES_MAX_CONNECTIONS: "500"
      POSTGRES_SHARED_BUFFERS: "512MB"
      POSTGRES_EFFECTIVE_CACHE_SIZE: "2GB"
      POSTGRES_WORK_MEM: "32MB"
      POSTGRES_MAINTENANCE_WORK_MEM: "256MB"
    volumes:
      - postgres-prod-data:/var/lib/postgresql/data
      - postgres-prod-backups:/backups
      - ../../backend/init-scripts:/docker-entrypoint-initdb.d:ro
    networks:
      - prod-db
      - prod-backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s
    logging: *production-logging
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 1G

  neo4j:
    image: neo4j:5.15-community
    container_name: autopentestai-prod-neo4j
    <<: *always-restart
    environment:
      NEO4J_AUTH: ${NEO4J_USER:?required}/${NEO4J_PASSWORD:?required}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_memory_heap_initial__size: "1g"
      NEO4J_dbms_memory_heap_max__size: "4g"
      NEO4J_dbms_memory_pagecache_size: "2g"
      NEO4J_dbms_memory_transaction_total_max: "1g"
      NEO4J_dbms_transaction_timeout: "60s"
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    volumes:
      - neo4j-prod-data:/data
      - neo4j-prod-logs:/logs
      - neo4j-prod-backups:/backups
    networks:
      - prod-db
      - prod-backend
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    logging: *production-logging
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 6G
        reservations:
          cpus: '1'
          memory: 2G

  # ============================================================================
  # APPLICATION TIER — Production-grade configuration
  # ============================================================================

  backend:
    image: ${BACKEND_IMAGE:?BACKEND_IMAGE required}:${IMAGE_TAG:?IMAGE_TAG required}
    container_name: autopentestai-prod-backend
    <<: *always-restart
    environment:
      ENVIRONMENT: production
      PROJECT_NAME: "AutoPenTest AI"
      DEBUG: "false"
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY required - must be 40+ chars}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
      BACKEND_CORS_ORIGINS: '["${PRODUCTION_URL:?required}"]'
      LOG_LEVEL: WARNING
      # OpenTelemetry
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_ENDPOINT:-}
      OTEL_SERVICE_NAME: autopentestai-backend
      # Rate limiting
      RATE_LIMIT_ENABLED: "true"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    networks:
      - prod-backend
      - prod-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    logging: *production-logging
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
      update_config:
        parallelism: 1
        delay: 30s
        failure_action: rollback
        order: start-first
      rollback_config:
        parallelism: 1
        delay: 10s
        order: stop-first

  frontend:
    image: ${FRONTEND_IMAGE:?FRONTEND_IMAGE required}:${IMAGE_TAG}
    container_name: autopentestai-prod-frontend
    <<: *always-restart
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${PRODUCTION_API_URL:?required}
      NEXT_PUBLIC_WS_URL: ${PRODUCTION_WS_URL:?required}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - prod-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s
    logging: *production-logging
    deploy:
      replicas: 2
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  # ============================================================================
  # REVERSE PROXY (Nginx) — SSL termination & load balancing
  # ============================================================================

  nginx:
    image: nginx:1.25-alpine
    container_name: autopentestai-prod-nginx
    <<: *always-restart
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - prod-frontend
      - prod-backend
    logging: *production-logging

  # ============================================================================
  # BACKUP SERVICE — Automated database backups
  # ============================================================================

  backup:
    image: postgres:16-alpine
    container_name: autopentestai-prod-backup
    <<: *always-restart
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      BACKUP_SCHEDULE: "0 2 * * *"  # Daily at 02:00
      BACKUP_RETENTION_DAYS: 30
    volumes:
      - postgres-prod-backups:/backups
      - ../../backend/backup:/scripts:ro
    networks:
      - prod-db
    command: >
      sh -c "while true; do
        sleep 86400;
        PGPASSWORD=$$POSTGRES_PASSWORD pg_dump -h $$POSTGRES_HOST -U $$POSTGRES_USER $$POSTGRES_DB
          | gzip > /backups/backup-$(date +%Y%m%d-%H%M%S).sql.gz;
        find /backups -name 'backup-*.sql.gz' -mtime +$$BACKUP_RETENTION_DAYS -delete;
        echo 'Backup completed at $(date)';
      done"
    logging: *production-logging

# ==============================================================================
# NETWORKS — Strict isolation
# ==============================================================================

networks:
  prod-db:
    driver: bridge
    internal: true
    name: autopentestai-prod-db-network
  prod-backend:
    driver: bridge
    name: autopentestai-prod-backend-network
  prod-frontend:
    driver: bridge
    name: autopentestai-prod-frontend-network

# ==============================================================================
# VOLUMES
# ==============================================================================

volumes:
  postgres-prod-data:
    name: autopentestai-prod-postgres-data
    driver: local
  postgres-prod-backups:
    name: autopentestai-prod-postgres-backups
    driver: local
  neo4j-prod-data:
    name: autopentestai-prod-neo4j-data
    driver: local
  neo4j-prod-logs:
    name: autopentestai-prod-neo4j-logs
    driver: local
  neo4j-prod-backups:
    name: autopentestai-prod-neo4j-backups
    driver: local
  nginx-certs:
    name: autopentestai-prod-nginx-certs
    driver: local
  nginx-logs:
    name: autopentestai-prod-nginx-logs
    driver: local
